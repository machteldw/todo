<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pip's To-Do — Machteld</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    header {
      max-width: 640px;
      margin: 0 auto 28px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    header p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
    }

    .section {
      max-width: 640px;
      margin: 0 auto 20px;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .section-header {
      padding: 12px 18px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid #f0efeb;
    }

    .item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 18px;
      border-bottom: 1px solid #f5f4f0;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }

    .item:last-child { border-bottom: none; }
    .item:hover { background: #fafaf8; }

    .item.done .label {
      text-decoration: line-through;
      color: #aaa;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid #ddd;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: #fff;
    }

    .item.done .checkbox {
      background: #34c759;
      border-color: #34c759;
    }

    .item.done .checkbox::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }

    .label {
      font-size: 0.95rem;
      line-height: 1.4;
      color: #1a1a1a;
    }

    .label a {
      font-size: 0.8rem;
      color: #007aff;
      display: block;
      margin-top: 2px;
      word-break: break-all;
    }

    /* Section colors */
    .s-dinsdag .section-header  { background: #fff8e6; color: #b07800; }
    .s-vrijdag .section-header  { background: #fff0fa; color: #9b2a7a; }
    .s-week .section-header     { background: #f0f7ff; color: #0055b3; }
    .s-maandag .section-header  { background: #f0fff4; color: #1a7a3c; }
    .s-datum .section-header    { background: #f5f0ff; color: #5c2da6; }
    .s-uitzoeken .section-header{ background: #fff3f0; color: #b33000; }
    .s-afwachten .section-header{ background: #f2f2f2; color: #555; }
    .s-betalen .section-header  { background: #fff8e6; color: #b07800; }
    .s-speeltuin .section-header{ background: #f0fff8; color: #1a7a60; }
    .s-doen .section-header     { background: #f0f4ff; color: #1a3ab3; }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #bbb;
      max-width: 640px;
      margin: 8px auto 0;
    }

    .reset-btn {
      display: block;
      max-width: 640px;
      margin: 0 auto 12px;
      text-align: right;
    }

    .reset-btn button {
      background: none;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 5px 12px;
      font-size: 0.78rem;
      color: #888;
      cursor: pointer;
    }

    .reset-btn button:hover { background: #f5f5f5; }
  </style>
</head>
<body>

<header>
  <h1>🐾 To-Do — Machteld</h1>
  <p>Klik een item aan om het af te vinken. Vinkjes worden bewaard.</p>
</header>

<div class="reset-btn">
  <button onclick="resetAll()">Alles terugzetten</button>
</div>

<div id="list"></div>

<footer>Bijgehouden door Pip · vinkjes opgeslagen in je browser</footer>

<script>
const data = [
  {
    id: "dinsdag",
    cls: "s-dinsdag",
    title: "📅 Dinsdag (deze week)",
    items: [
      { id: "d1", text: "Ed — gegevens voor 2024 aangifte sturen + vragen wat het kost" },
      { id: "d2", text: "Daniele — terugkomen op overzicht" },
      { id: "d3", text: "Deel regelen" },
      { id: "d4", text: "Kate bellen (was zondag jarig)" },
      { id: "d5", text: "Afspraak maken met Martin en Andries" },
      { id: "d6", text: "Facturen schrijven + overzicht maken" },
      { id: "d7", text: "Tabs — spullen sturen" },
      { id: "d8", text: "Tandarts afspraak 12:00" },
      { id: "d9", text: "Luc bellen (dinsdagochtend)" },
    ]
  },
  {
    id: "vrijdag",
    cls: "s-vrijdag",
    title: "📅 Vrijdag",
    items: [
      { id: "v1", text: "Wieke bericht sturen" },
    ]
  },
  {
    id: "week",
    cls: "s-week",
    title: "📅 Deze week",
    items: [
      { id: "w1", text: "Bankbetalingen in backend bijwerken" },
      { id: "w2", text: "Wolbel rekening checken + stop limit opdrachten instellen" },
    ]
  },
  {
    id: "maandag",
    cls: "s-maandag",
    title: "📅 Volgende week maandag",
    items: [
      { id: "m1", text: "Vincent bellen" },
    ]
  },
  {
    id: "datum",
    cls: "s-datum",
    title: "📅 23 maart",
    items: [
      { id: "dt1", text: "Inschrijven bij Ali Fryslân voor veiling" },
    ]
  },
  {
    id: "uitzoeken",
    cls: "s-uitzoeken",
    title: "🔍 Uitzoeken",
    items: [
      { id: "u1", text: "Verzekeringen Wolf uitzoeken" },
    ]
  },
  {
    id: "afwachten",
    cls: "s-afwachten",
    title: "⏳ Afwachten",
    items: [
      { id: "a1", text: "Concept Benefits — antwoord op mailtje afwachten" },
      { id: "a2", text: "Maurice Vink (AON) — offerte aanpassing (vraag 5 Carlo)" },
      { id: "a3", text: "Medicatie Izzy en Nero — wachten tot ze terugbellen" },
    ]
  },
  {
    id: "betalen",
    cls: "s-betalen",
    title: "💸 Betalen",
    items: [
      { id: "b1", text: "Invoice Kaue" },
      { id: "b2", text: "Salaris Barnes doorgeven" },
      { id: "b3", text: "Vebego betalen" },
    ]
  },
  {
    id: "speeltuin",
    cls: "s-speeltuin",
    title: "🛝 Speeltuin",
    items: [
      { id: "sp1", text: "Vakantiedagen Violeta uitzoeken" },
      { id: "sp2", text: "Peter bellen" },
      { id: "sp3", text: "Boodschappen doen" },
    ]
  },
  {
    id: "doen",
    cls: "s-doen",
    title: "📬 Doen",
    items: [
      { id: "do1", text: "Medewerker van Jeff (Karelia Cruz) — e-mail beantwoorden" },
      { id: "do2", text: "Bestuursaansprakelijkheidsverzekering regelen (Maurice Vink)" },
      { id: "do3", text: "Cadeau naar Timeas versturen" },
      { id: "do4", text: "Jordan's Furniture — invoice van de US entity + bankgegevens aanleveren" },
      { id: "do5", text: "TopCon — vendor registration invullen", link: "https://topconhealthcare.com/new-vendor-setup/" },
      { id: "do6", text: "Four Hands — vendor registration invullen", link: "https://app.precoro.us/supplier/registration/create/6632/3c1b8b9fdae25219e04d251e501a055f" },
      { id: "do7", text: "Four Hands — agreement Hugo uitzoeken" },
      { id: "do8", text: "Ralph Lauren — feedback insurance?" },
    ]
  },
];

function getState() {
  try { return JSON.parse(localStorage.getItem('todo_state') || '{}'); } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem('todo_state', JSON.stringify(state));
}

function toggle(id) {
  const state = getState();
  state[id] = !state[id];
  saveState(state);
  render();
}

function resetAll() {
  if (confirm('Alle vinkjes verwijderen?')) {
    localStorage.removeItem('todo_state');
    render();
  }
}

function render() {
  const state = getState();
  const container = document.getElementById('list');
  container.innerHTML = '';

  data.forEach(section => {
    const div = document.createElement('div');
    div.className = `section ${section.cls}`;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = section.title;
    div.appendChild(header);

    section.items.forEach(item => {
      const done = !!state[item.id];
      const row = document.createElement('div');
      row.className = 'item' + (done ? ' done' : '');
      row.onclick = () => toggle(item.id);

      const box = document.createElement('div');
      box.className = 'checkbox';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = item.text;

      if (item.link) {
        const a = document.createElement('a');
        a.href = item.link;
        a.textContent = item.link;
        a.target = '_blank';
        a.onclick = e => e.stopPropagation();
        label.appendChild(a);
      }

      row.appendChild(box);
      row.appendChild(label);
      div.appendChild(row);
    });

    container.appendChild(div);
  });
}

render();
</script>
</body>
</html>
